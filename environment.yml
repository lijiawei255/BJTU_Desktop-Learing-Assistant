# environment.yml — Anaconda 环境配置文件
# 协作者可通过此文件一键创建与主开发者完全一致的 amiya 虚拟环境
#
# 使用方法：
#   conda env create -f environment.yml
#   conda activate amiya
#
# 更新已有环境：
#   conda env update -f environment.yml --prune

name: amiya
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - webrtcvad==2.0.10
    - PyAudio==0.2.14
    - numpy>=2.4.0
    - opencv-python>=4.13.0
    - dashscope>=1.24.6
    - pydantic>=2.13.0
    - python-dotenv>=1.2.0
    - requests>=2.33.0
    - setuptools>=65.0,<70.0
    - pytest>=9.0.0
    - pytest-asyncio>=1.3.0
    - black>=26.0.0
